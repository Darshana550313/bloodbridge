{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <h1 class="h3 mb-3">Login</h1>
        <form method="post">
            <label class="form-label">Email</label>
            <input class="form-control mb-3" type="email" name="email" required>
            <label class="form-label">Password</label>
            <input class="form-control mb-4" type="password" name="password" required>
            <button class="btn btn-danger w-100" type="submit"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
        </form>
        <p class="text-muted mt-3 mb-0">New here? <a href="{{ url_for('auth.register') }}">Create an account</a>.</p>
    </div>
</section>
{% endblock %}
